<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Orario Sala 2026 PRO</title>

<style>
body { font-family: system-ui; background:#f1f5f9; padding:20px;}
h1 { margin-bottom:10px;}

.topbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;}

button {
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:600;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

th { background:#0f172a; color:white; }

.nome { background:#e2e8f0; font-weight:bold; }

input {
  width:100%;
  border:none;
  text-align:center;
  background:transparent;
}

/* COLORI TURNI */
.caffetteria { background:#d6a15f; }
.ambra { background:#c084fc; }
.riposo { background:#f87171; }
.buffet { background:#7dd3fc; }
.fuori { background:#fde047; }
.tre { background:#86efac; }

/* STAMPA */
@media print {
  .topbar { display:none; }
}
</style>
</head>

<body>

<h1>Orario Sala 2026</h1>

<div class="topbar">
  <button onclick="prevSettimana()">⬅️</button>
  <button onclick="nextSettimana()">➡️</button>
  <button onclick="nuovaSettimana()">➕ Settimana</button>
  <button onclick="aggiungiDipendente()">➕ Dipendente</button>
  <button onclick="window.print()">📄 PDF</button>
</div>

<div id="labelSettimana"></div>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Lun<br><small id="d0"></small></th>
<th>Mar<br><small id="d1"></small></th>
<th>Mer<br><small id="d2"></small></th>
<th>Gio<br><small id="d3"></small></th>
<th>Ven<br><small id="d4"></small></th>
<th>Sab<br><small id="d5"></small></th>
<th>Dom<br><small id="d6"></small></th>
</tr>
</thead>
<tbody id="corpo"></tbody>
</table>

<datalist id="mansioniList"></datalist>

<script>
let mansioni = [
  "Caffetteria",
  "Ambra",
  "Riposo",
  "Buffet",
  "Fuori Lunch",
  "Tre Turni",
  "10-15",
  "18-23"
];

let archivio = JSON.parse(localStorage.getItem("orarioMulti")) || [];
let settimanaCorrente = 0;

if (archivio.length === 0) {
  archivio.push(creaSettimana(new Date()));
}

/* CREA SETTIMANA */
function creaSettimana(dataBase) {
  let base = new Date(dataBase);
  base.setDate(base.getDate() - base.getDay() + 1);

  return { start: base, dipendenti: [] };
}

/* DATE */
function aggiornaDate() {
  let base = new Date(archivio[settimanaCorrente].start);

  let fine = new Date(base);
  fine.setDate(base.getDate()+6);

  document.getElementById("labelSettimana").innerText =
    base.toLocaleDateString()+" - "+fine.toLocaleDateString();

  for (let i=0;i<7;i++) {
    let d = new Date(base);
    d.setDate(base.getDate()+i);
    document.getElementById("d"+i).innerText =
      d.getDate()+"/"+(d.getMonth()+1);
  }
}

/* COLORI */
function getClasse(turno) {
  turno = turno.toLowerCase();

  if (turno.includes("caff")) return "caffetteria";
  if (turno.includes("ambra")) return "ambra";
  if (turno.includes("rip")) return "riposo";
  if (turno.includes("buffet")) return "buffet";
  if (turno.includes("fuori")) return "fuori";
  if (turno.includes("tre")) return "tre";

  return "";
}

/* RENDER */
function render() {
  let corpo = document.getElementById("corpo");
  corpo.innerHTML = "";

  let settimana = archivio[settimanaCorrente];

  settimana.dipendenti.forEach((d,i)=>{
    let tr = document.createElement("tr");

    let tdNome = document.createElement("td");
    tdNome.className="nome";
    tdNome.innerHTML =
      `<input value="${d.nome}" onchange="salvaNome(${i},this.value)">`;
    tr.appendChild(tdNome);

    for (let g=0;g<7;g++) {
      let turno = d.turni[g] || "";
      let classe = getClasse(turno);

      let td = document.createElement("td");
      td.className = classe;

      td.innerHTML =
        `<input list="mansioniList"
         value="${turno}"
         onchange="salvaTurno(${i},${g},this.value)">`;

      tr.appendChild(td);
    }

    corpo.appendChild(tr);
  });

  caricaMansioni();
  aggiornaDate();
  salva();
}

/* MANSIONI */
function caricaMansioni() {
  let dl = document.getElementById("mansioniList");
  dl.innerHTML = "";

  mansioni.forEach(m=>{
    let opt=document.createElement("option");
    opt.value=m;
    dl.appendChild(opt);
  });
}

/* NAV */
function nextSettimana(){
  if(settimanaCorrente<archivio.length-1){
    settimanaCorrente++;
    render();
  }
}

function prevSettimana(){
  if(settimanaCorrente>0){
    settimanaCorrente--;
    render();
  }
}

/* NUOVA SETTIMANA CON COPIA DIPENDENTI */
function nuovaSettimana(){
  let ultima = archivio[archivio.length-1];

  let nuovaData = new Date(ultima.start);
  nuovaData.setDate(nuovaData.getDate()+7);

  let nuova = creaSettimana(nuovaData);

  /* COPIA SOLO NOMI */
  nuova.dipendenti = ultima.dipendenti.map(d => ({
    nome: d.nome,
    turni: ["","","","","","",""]
  }));

  archivio.push(nuova);
  settimanaCorrente = archivio.length-1;

  render();
}

/* DATI */
function aggiungiDipendente(){
  let nome = prompt("Nome dipendente:");
  if(!nome) return;

  archivio[settimanaCorrente].dipendenti.push({
    nome:nome,
    turni:["","","","","","",""]
  });

  render();
}

function salvaNome(i,val){
  archivio[settimanaCorrente].dipendenti[i].nome=val;
  salva();
}

function salvaTurno(i,g,val){
  archivio[settimanaCorrente].dipendenti[i].turni[g]=val;
  render();
}

function salva(){
  localStorage.setItem("orarioMulti",JSON.stringify(archivio));
}

/* INIT */
render();
</script>

</body>
</html>
