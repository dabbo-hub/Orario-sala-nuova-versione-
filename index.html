<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Orario Sala 2026 PRO</title>

<style>
body { font-family: system-ui; background:#f1f5f9; padding:20px;}
h1 { margin-bottom:10px;}

.topbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;}

button {
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button.danger { background:#dc2626; }

table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

th { background:#0f172a; color:white; }

.nome { background:#e2e8f0; font-weight:bold; }

input {
  width:100%;
  border:none;
  text-align:center;
  background:transparent;
}

.settimana {
  font-weight:bold;
  margin-bottom:10px;
}

/* STAMPA */
@media print {
  .topbar { display:none; }
}
</style>
</head>

<body>

<h1>Orario Sala 2026</h1>

<div class="topbar">
  <button onclick="prevSettimana()">⬅️</button>
  <button onclick="nextSettimana()">➡️</button>
  <button onclick="nuovaSettimana()">➕ Settimana</button>
  <button onclick="aggiungiDipendente()">➕ Dipendente</button>
  <button onclick="window.print()">📄 PDF</button>
  <button class="danger" onclick="resetDati()">🗑️ Reset</button>
</div>

<div class="settimana" id="labelSettimana"></div>

<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th>Lun<br><small id="d0"></small></th>
      <th>Mar<br><small id="d1"></small></th>
      <th>Mer<br><small id="d2"></small></th>
      <th>Gio<br><small id="d3"></small></th>
      <th>Ven<br><small id="d4"></small></th>
      <th>Sab<br><small id="d5"></small></th>
      <th>Dom<br><small id="d6"></small></th>
    </tr>
  </thead>
  <tbody id="corpo"></tbody>
</table>

<script>
let archivio = JSON.parse(localStorage.getItem("orarioMulti")) || [];
let settimanaCorrente = 0;

/* CREA PRIMA SETTIMANA */
if (archivio.length === 0) {
  archivio.push(creaSettimana(new Date()));
}

/* CREA STRUTTURA SETTIMANA */
function creaSettimana(dataBase) {
  let base = new Date(dataBase);
  base.setDate(base.getDate() - base.getDay() + 1);

  return {
    start: base,
    dipendenti: []
  };
}

/* DATE */
function aggiornaDate() {
  let settimana = archivio[settimanaCorrente];
  let base = new Date(settimana.start);

  for (let i=0;i<7;i++) {
    let d = new Date(base);
    d.setDate(base.getDate()+i);
    document.getElementById("d"+i).innerText =
      d.getDate()+"/"+(d.getMonth()+1);
  }

  document.getElementById("labelSettimana").innerText =
    "Settimana: " + base.toLocaleDateString();
}

/* RENDER */
function render() {
  let corpo = document.getElementById("corpo");
  corpo.innerHTML = "";

  let settimana = archivio[settimanaCorrente];

  settimana.dipendenti.forEach((d,i)=>{
    let tr = document.createElement("tr");

    let tdNome = document.createElement("td");
    tdNome.className="nome";
    tdNome.innerHTML =
      `<input value="${d.nome}" onchange="salvaNome(${i},this.value)">`;
    tr.appendChild(tdNome);

    for (let g=0;g<7;g++) {
      let td = document.createElement("td");
      td.innerHTML =
        `<input placeholder="es: 10-15 / 18-23"
         value="${d.turni[g]||""}"
         onchange="salvaTurno(${i},${g},this.value)">`;
      tr.appendChild(td);
    }

    corpo.appendChild(tr);
  });

  aggiornaDate();
  salva();
}

/* NAVIGAZIONE */
function nextSettimana() {
  if (settimanaCorrente < archivio.length-1) {
    settimanaCorrente++;
    render();
  }
}

function prevSettimana() {
  if (settimanaCorrente > 0) {
    settimanaCorrente--;
    render();
  }
}

function nuovaSettimana() {
  let ultima = archivio[archivio.length - 1];

  let nuovaData = new Date(ultima.start);
  nuovaData.setDate(nuovaData.getDate() + 7);

  let nuova = creaSettimana(nuovaData);

  archivio.push(nuova);
  settimanaCorrente = archivio.length - 1;

  render();
}

/* DATI */
function aggiungiDipendente() {
  let nome = prompt("Nome dipendente:");
  if (!nome) return;

  archivio[settimanaCorrente].dipendenti.push({
    nome: nome,
    turni: ["","","","","","",""]
  });

  render();
}

function salvaNome(i,val) {
  archivio[settimanaCorrente].dipendenti[i].nome = val;
  salva();
}

function salvaTurno(i,g,val) {
  archivio[settimanaCorrente].dipendenti[i].turni[g] = val;
  salva();
}

function salva() {
  localStorage.setItem("orarioMulti", JSON.stringify(archivio));
}

function resetDati() {
  if(confirm("Cancellare tutto?")) {
    localStorage.clear();
    location.reload();
  }
}

/* INIT */
render();
</script>

</body>
</html>
